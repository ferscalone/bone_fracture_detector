# docker compose запускает один сервис — веб-приложение с детектором переломов.
# Файл рассчитан на запуск одной командой:
#     docker compose up --build
#
# Дополнительные настройки (порт, ссылка на веса) — через .env (см. .env.example).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bone-fracture-detector
    # Прокидываем порт Gradio наружу. По умолчанию 7860, можно поменять через .env.
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    environment:
      # Эти переменные пробрасываются в контейнер. Если в .env пусто, остаются дефолты.
      - GRADIO_PORT=${GRADIO_PORT:-7860}
      - MODEL_URL=${MODEL_URL:-}
      - MODEL_PATH=/app/models/model.pth
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.5}
    volumes:
      # Веса модели монтируем как volume, чтобы они переживали пересборку
      # контейнера (иначе пришлось бы качать их снова и снова).
      - ./models:/app/models
    restart: unless-stopped